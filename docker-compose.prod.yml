# Docker Compose pour la production
# Architecture optimisée avec reverse proxy et services scalables

services:
  # ===== REVERSE PROXY =====
  proxy:
    image: nginx:alpine
    container_name: redriva-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/conf.d:/etc/nginx/conf.d:ro
      - redriva-ssl-certs:/etc/nginx/ssl:ro
    networks:
      - redriva-frontend
    depends_on:
      - frontend
    restart: unless-stopped
    labels:
      - "com.redriva.service=proxy"

  # ===== REDIS (File d'attente) =====
  redis:
    image: redis:7-alpine
    container_name: redriva-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redriva-redis-data:/data
    networks:
      - redriva-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.redriva.service=redis"

  # ===== BACKEND API =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: redriva/backend:latest
    container_name: redriva-backend
    volumes:
      - redriva-data:/app/data
      - redriva-logs:/app/logs
    networks:
      - redriva-backend
      - redriva-frontend
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    env_file:
      - .env.prod
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    labels:
      - "com.redriva.service=backend"

  # ===== WORKER (Traitement des tâches) =====
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: redriva/backend:latest
    container_name: redriva-worker
    command: ["arq", "services.queue_service.WorkerSettings"]
    volumes:
      - redriva-data:/app/data
      - redriva-logs:/app/logs
    networks:
      - redriva-backend
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    env_file:
      - .env.prod
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    labels:
      - "com.redriva.service=worker"

  # ===== FRONTEND =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    image: redriva/frontend:latest
    container_name: redriva-frontend
    networks:
      - redriva-frontend
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - API_BACKEND_URL=http://backend:8000
      - NGINX_PORT=3000
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'
    labels:
      - "com.redriva.service=frontend"

# ===== RÉSEAUX =====
networks:
  redriva-frontend:
    driver: bridge
    name: redriva-frontend
  redriva-backend:
    driver: bridge
    name: redriva-backend
    internal: true  # Réseau interne pour la sécurité

# ===== VOLUMES PERSISTANTS =====
volumes:
  redriva-data:
    driver: local
    name: redriva-data
  redriva-logs:
    driver: local
    name: redriva-logs
  redriva-redis-data:
    driver: local
    name: redriva-redis-data
  redriva-ssl-certs:
    driver: local
    name: redriva-ssl-certs
