<form hx-post="/add-torrent" hx-target="#content" class="bg-white p-6 rounded-lg shadow">
    <h3 class="text-lg font-semibold mb-4">Ajouter un nouveau torrent</h3>
    <div class="mb-4">
        <label for="torrent_name" class="block text-sm font-medium text-gray-700 mb-2">
            Nom du torrent
        </label>
        <input 
            type="text" 
            name="torrent_name" 
            id="torrent_name"
            required
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Entrez le nom du torrent"
        >
    </div>
    <div class="flex gap-2">
        <button 
            type="submit" 
            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded"
        >
            Ajouter
        </button>
        <button 
            type="button" 
            hx-get="/load-data" 
            hx-target="#content"
            class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded"
        >
            Annuler
        </button>
    </div>
</form>
