<!-- Modal Header -->
<div class="flex justify-between items-center pb-3 border-b border-gray-200 dark:border-gray-700">
    <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Détails du Torrent</h3>
</div>

<!-- Modal Content -->
<div class="mt-4 space-y-4">
    <div>
        <h4 class="font-medium text-gray-900 dark:text-gray-100">{{ torrent.name }}</h4>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1 font-mono">{{ torrent.hash }}</p>
    </div>
    
    <div class="grid grid-cols-2 gap-4 text-sm">
        <div>
            <span class="font-medium text-gray-600 dark:text-gray-400">Taille:</span>
            <span class="ml-2 text-gray-900 dark:text-gray-200">{{ torrent.size }}</span>
        </div>
        <div>
            <span class="font-medium text-gray-600 dark:text-gray-400">Statut:</span>
            <span class="ml-2 text-gray-900 dark:text-gray-200">{{ torrent.status }}</span>
        </div>
        <div>
            <span class="font-medium text-gray-600 dark:text-gray-400">Seeders:</span>
            <span class="ml-2 text-gray-900 dark:text-gray-200">{{ torrent.seeders }}</span>
        </div>
        <div>
            <span class="font-medium text-gray-600 dark:text-gray-400">Ajouté le:</span>
            <span class="ml-2 text-gray-900 dark:text-gray-200">{{ torrent.added_date }}</span>
        </div>
    </div>
    
    {% if torrent.magnet_url %}
    <div>
        <span class="font-medium text-gray-600 dark:text-gray-400">Magnet URL:</span>
        <div class="mt-1 p-2 bg-gray-100 dark:bg-gray-700 rounded text-xs font-mono break-all text-gray-700 dark:text-gray-300">
            {{ torrent.magnet_url }}
        </div>
    </div>
    {% endif %}
</div>

<!-- Modal Actions -->
<div class="flex justify-end space-x-3 pt-4 border-t border-gray-200 dark:border-gray-700 mt-6">
    <button onclick="navigator.clipboard.writeText('{{ torrent.id }}')" 
            class="bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 text-gray-800 dark:text-gray-200 px-4 py-2 rounded-md text-sm font-medium transition-colors">
        Copy ID
    </button>
    {% if torrent.magnet_url %}
    <button onclick="navigator.clipboard.writeText('{{ torrent.magnet_url }}')" 
            class="bg-blue-100 dark:bg-blue-900 hover:bg-blue-200 dark:hover:bg-blue-800 text-blue-800 dark:text-blue-200 px-4 py-2 rounded-md text-sm font-medium transition-colors">
        Copy Magnet URL
    </button>
    {% endif %}
    <button onclick="navigator.clipboard.writeText('{{ torrent.hash }}')" 
            class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors">
        Copy Hash
    </button>
    <button hx-delete="/torrents/{{ torrent.id }}" 
            hx-confirm="Êtes-vous sûr de vouloir supprimer ce torrent ?"
            class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors">
        Delete
    </button>
</div>
