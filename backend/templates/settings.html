{% extends "base.html" %}

{% block content %}
<div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6">
    <h2 class="text-2xl font-semibold mb-6 text-gray-900 dark:text-white">Settings</h2>
    
    <div class="flex flex-col md:flex-row gap-6">
        <!-- Colonne de gauche - Sous-menu -->
        <div class="w-full md:w-64 bg-gray-50 dark:bg-gray-800/50 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
            <nav class="space-y-1">
                <a href="#" 
                   hx-get="/settings/debrid" 
                   hx-target="#settings-content"
                   class="block px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-blue-100 dark:hover:bg-blue-900/50 hover:text-blue-600 dark:hover:text-blue-400 rounded-md font-medium transition-colors">
                    Debrid
                </a>
                <a href="#" 
                   hx-get="/settings/arrs" 
                   hx-target="#settings-content"
                   class="block px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-blue-100 dark:hover:bg-blue-900/50 hover:text-blue-600 dark:hover:text-blue-400 rounded-md font-medium transition-colors">
                    *Arrs
                </a>
                <a href="#" 
                   hx-get="/settings/repair" 
                   hx-target="#settings-content"
                   class="block px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-blue-100 dark:hover:bg-blue-900/50 hover:text-blue-600 dark:hover:text-blue-400 rounded-md font-medium transition-colors">
                    Repair
                </a>
            </nav>
        </div>
        
        <!-- Colonne de droite - Contenu -->
        <div class="flex-1">
            <div id="settings-content">
                {{ debrid_content | safe }}
            </div>
        </div>
    </div>
</div>
{% endblock %}
