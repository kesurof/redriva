<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redriva</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold">Redriva</h1>
        <div class="mt-4 flex gap-2 flex-wrap">
            <button hx-get="/load-data" hx-target="#content" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                Charger les données
            </button>
            <button hx-get="/add-torrent-form" hx-target="#content" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">
                Ajouter un torrent
            </button>
            <button hx-get="/start-device-auth" hx-target="#content" class="bg-purple-500 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded">
                Se connecter à Real-Debrid
            </button>
        </div>
        <div id="content" class="mt-4">
            <!-- Le contenu dynamique sera chargé ici par HTMX -->
        </div>
    </div>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</body>
</html>
