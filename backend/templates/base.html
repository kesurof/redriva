<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redriva</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
    <div class="container mx-auto p-4">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-blue-600">Redriva</h1>
            <nav class="flex justify-end space-x-6">
                <a href="/" class="text-gray-700 hover:text-blue-600 font-medium transition-colors">Dashboard</a>
                <a href="/torrents" class="text-gray-700 hover:text-blue-600 font-medium transition-colors">Torrents</a>
                <a href="/symlinks" class="text-gray-700 hover:text-blue-600 font-medium transition-colors">Symlinks</a>
                <a href="/settings" class="text-gray-700 hover:text-blue-600 font-medium transition-colors">Settings</a>
            </nav>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</body>
</html>
