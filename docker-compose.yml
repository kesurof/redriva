version: "3.8"
services:
  backend:
    build: ./backend
    env_file:
      - ./config/.env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    environment:
      - RD_TOKEN=${RD_TOKEN}
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000
