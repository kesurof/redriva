services:
  backend:
    container_name: redriva-backend
    build:
      context: ./backend
      dockerfile: Dockerfile 
    volumes:
      - ./backend:/app 
      - redriva-data:/app/data
      - redriva-logs:/app/logs
    ports:
      - "8080:8000"
    networks:
      - redriva-net
    restart: unless-stopped
    env_file:
      - .env
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      - "com.redriva.service=backend"

  frontend:
    container_name: redriva-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5174:5174"
    networks:
      - redriva-net
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8080
    command: npm run dev -- --host 0.0.0.0 --port 5174
    labels:
      - "com.redriva.service=frontend-vue"

networks:
  redriva-net:
    driver: bridge

volumes:
  redriva-data:
  redriva-logs:
