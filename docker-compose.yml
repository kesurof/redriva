services:
  backend:
    container_name: redriva-backend
    build:
      context: ./backend
      dockerfile: Dockerfile 
    env_file:
      - ./config/.env
    volumes:
      - ./backend:/app 
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    restart: unless-stopped
    # Voici la ligne à corriger :
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      - "com.redriva.service=backend"

  frontend:
    container_name: redriva-frontend
    build: ./frontend
    command: npm run dev -- --host # Lance le serveur de développement et le rend accessible
    ports:
      - "5173:5173" # Port par défaut de Vite/SvelteKit pour le développement
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://backend:8000
    volumes:
      # Synchronise le code du frontend en temps réel pour le développement
      - ./frontend:/usr/src/app
      # Isole les node_modules dans le conteneur pour ne pas les avoir en local
      - /usr/src/app/node_modules
    restart: unless-stopped
    # Le healthcheck sur un serveur de dev n'est pas toujours fiable, on peut le commenter
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:5173"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5
    labels:
      - "com.redriva.service=frontend"

