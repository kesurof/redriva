services:
  backend:
    container_name: redriva-backend
    build:
      context: ./backend
      dockerfile: Dockerfile 
    env_file:
      - ./config/.env
    volumes:
      - ./backend:/app 
      # On lie les volumes nommés définis plus bas
      - redriva-data:/app/data
      - redriva-logs:/app/logs
    ports:
      - "8000:8000"
    # On assigne ce service au réseau que nous définissons
    networks:
      - redriva-net
    restart: unless-stopped
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      - "com.redriva.service=backend"

# ===============================================
# DÉCLARATION EXPLICITE DES RESSOURCES
# ===============================================

# On définit un réseau commun pour nos services
networks:
  redriva-net:
    driver: bridge

# On définit les volumes pour les données persistantes
volumes:
  redriva-data:
  redriva-logs:
